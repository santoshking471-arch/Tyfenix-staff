<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Staff Dashboard</title>
<style>
    :root { --bg: #ffffff; --text: #000000; --card: #f7f7f7; --primary: #0b2e6f; }
    @media (prefers-color-scheme: dark) {
        :root { --bg: #121212; --text: #ffffff; --card: #1e1e1e; --primary: #38bdf8; }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); }

    /* Header */
    .header { position: sticky; top: 0; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--bg); z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .logo { font-weight: 800; font-size: 20px; }
    .menu-btn { cursor: pointer; font-size: 24px; padding: 5px; }

    /* WhatsApp Style Drawer */
    .drawer { position: fixed; top: 0; left: -280px; width: 270px; height: 100%; background: var(--bg); z-index: 2000; transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); box-shadow: 5px 0 15px rgba(0,0,0,0.2); padding-top: 70px; }
    .drawer.active { left: 0; }
    .drawer a { display: block; padding: 18px 25px; text-decoration: none; color: var(--text); font-weight: 500; border-bottom: 1px solid rgba(128,128,128,0.1); }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
    .overlay.active { display: block; }

    /* Dashboard */
    .content { padding: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
    .card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; }
    .btn-group { display: flex; flex-direction: column; gap: 12px; }
    .btn { background: var(--primary); color: #fff; padding: 16px; border-radius: 12px; text-align: center; font-weight: bold; border: none; cursor: pointer; font-size: 15px; }
</style>
</head>
<body>

<div class="header">
    <div class="logo">TYFENIX</div>
    <div class="menu-btn" onclick="toggleDrawer()">☰</div>
</div>

<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
    <a href="#" onclick="menuAction('Profile')">My Profile</a>
    <a href="#" onclick="menuAction('Eky Status')">Eky Status</a>
    <a href="#" onclick="menuAction('Activities')">My Activities</a>
    <a href="#" onclick="menuAction('Offers')">Offers</a>
    <a href="#" onclick="menuAction('Rewards')">My Rewards</a>
    <a href="#" onclick="logout()" style="color:red">Logout</a>
</div>

<div class="content">
    <div class="grid">
        <div class="card"><h3>Products</h3><p id="myProducts">0</p></div>
        <div class="card"><h3>Orders</h3><p id="myOrders">0</p></div>
        <div class="card"><h3>Total</h3><p id="totalEarning">₹0</p></div>
        <div class="card"><h3>Today</h3><p id="todayEarning">₹0</p></div>
    </div>

    <div class="btn-group">
        <button class="btn" onclick="alert('Upload Product Page Coming Soon')">Upload Product</button>
        <button class="btn" onclick="alert('Orders Page Coming Soon')">Orders</button>
        <button class="btn" onclick="alert('Payment Status Page Coming Soon')">Payment Status</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM", authDomain: "reselling-store-c103e.firebaseapp.com", projectId: "reselling-store-c103e", storageBucket: "reselling-store-c103e.appspot.com", messagingSenderId: "411682468136", appId: "1:411682468136:web:79cc2b622148f42a62e01d" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function menuAction(option) {
        toggleDrawer();
        alert(option + " feature coming soon!");
    }

    auth.onAuthStateChanged(user => {
        if(!user) { window.location.href = "index.html"; return; }
        loadData(user.uid);
    });

    function loadData(uid) {
        db.collection("products").where("staffId", "==", uid).onSnapshot(s => { document.getElementById("myProducts").innerText = s.size; });
        db.collection("orders").where("staffId", "==", uid).onSnapshot(s => {
            let t=0, d=0; const today = new Date().toLocaleDateString();
            s.forEach(doc => {
                const data = doc.data();
                t += Number(data.amount || 0);
                if(data.timestamp) {
                    const date = new Date(data.timestamp.seconds * 1000).toLocaleDateString();
                    if(date === today) d += Number(data.amount || 0);
                }
            });
            document.getElementById("myOrders").innerText = s.size;
            document.getElementById("totalEarning").innerText = "₹" + t;
            document.getElementById("todayEarning").innerText = "₹" + d;
        });
    }

    function logout() { auth.signOut().then(() => window.location.href = "index.html"); }
</script>
</body>
</html>
