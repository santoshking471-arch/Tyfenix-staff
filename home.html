<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Staff Dashboard | TYFENIX</title>
<style>
    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
    }

    body, html {
        margin: 0; padding: 0; height: 100%;
        font-family: 'Segoe UI', Roboto, sans-serif;
        background: #f0f4f8; color: #333; overflow-x: hidden;
    }

    /* Slim Header */
    .header {
        position: fixed; top: 0; width: 100%; height: 60px;
        background: #0b2e6f; color: #fff; padding: 0 15px;
        display: flex; justify-content: space-between; align-items: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 1000;
    }

    .logo-text { font-size: 18px; font-weight: 800; letter-spacing: 1.5px; }

    .menu-btn {
        width: 40px; height: 40px; display: flex;
        flex-direction: column; justify-content: center;
        align-items: center; gap: 4px; cursor: pointer;
    }

    .menu-btn div { width: 22px; height: 2px; background: #fff; border-radius: 2px; }

    /* Navigation Menu */
    .nav-menu {
        position: fixed; top: 60px; right: -220px; width: 210px;
        background: #fff; box-shadow: -4px 4px 15px rgba(0,0,0,0.15);
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 0 0 0 15px; z-index: 999; padding: 10px 0;
    }

    .nav-menu.active { right: 0; }

    .nav-menu a {
        display: block; padding: 15px 20px; color: #333;
        text-decoration: none; font-size: 14px; font-weight: 500;
        border-bottom: 1px solid #f1f1f1;
    }

    .nav-menu a:last-child { color: #d93025; border-bottom: none; }

    /* Content Area */
    .content { padding: 80px 15px 20px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .card {
        background: #fff; padding: 20px 10px; border-radius: 12px;
        text-align: center; box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        border: 1px solid #e2e8f0;
    }

    .card h3 { margin: 0; font-size: 11px; color: #64748b; text-transform: uppercase; }
    .card p { margin: 8px 0 0; font-size: 18px; font-weight: 700; color: #0b2e6f; }
    .success-text { color: #16a34a !important; }
</style>
</head>
<body>

<div class="header">
    <div class="logo-text">TYFENIX</div>
    <div class="menu-btn" onclick="toggleMenu(event)">
        <div></div><div></div><div></div>
    </div>
</div>

<div class="nav-menu" id="navMenu">
    <a href="javascript:void(0)" onclick="handleNav('Profile')">My Profile</a>
    <a href="javascript:void(0)" onclick="handleNav('Status')">Eky Status</a>
    <a href="javascript:void(0)" onclick="handleNav('Activities')">My Activities</a>
    <a href="javascript:void(0)" onclick="handleNav('Offers')">Offers</a>
    <a href="javascript:void(0)" onclick="handleNav('Rewards')">My Rewards</a>
    <a href="javascript:void(0)" onclick="logout()">Logout</a>
</div>

<div class="content">
    <div class="grid">
        <div class="card"><h3>My Products</h3><p id="myProducts">0</p></div>
        <div class="card"><h3>My Orders</h3><p id="myOrders">0</p></div>
        <div class="card"><h3>Total Earning</h3><p id="totalEarning" class="success-text">₹0</p></div>
        <div class="card"><h3>Today</h3><p id="todayEarning" class="success-text">₹0</p></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
    authDomain: "reselling-store-c103e.firebaseapp.com",
    projectId: "reselling-store-c103e",
    storageBucket: "reselling-store-c103e.appspot.com",
    messagingSenderId: "411682468136",
    appId: "1:411682468136:web:79cc2b622148f42a62e01d"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function toggleMenu(e) { e.stopPropagation(); document.getElementById("navMenu").classList.toggle("active"); }
  document.addEventListener('click', () => { document.getElementById("navMenu").classList.remove("active"); });
  function handleNav(t) { alert(t + " coming soon!"); }

  function logout() {
      auth.signOut().then(() => { window.location.href = "index.html"; });
  }

  // Auth Protection
  auth.onAuthStateChanged(user => {
    if(!user) {
        window.location.href = "index.html"; // Login page ka sahi naam yahan likho
        return;
    }

    db.collection("staff").doc(user.uid).get().then(doc => {
        if(doc.exists && doc.data().approved === true) {
            loadData(user.uid);
        } else {
            // Agar approved nahi hai toh login page par fek do
            window.location.href = "index.html";
        }
    }).catch(() => {
        window.location.href = "index.html";
    });
  });

  function loadData(uid) {
      db.collection("products").where("staffId", "==", uid).onSnapshot(s => {
          document.getElementById("myProducts").innerText = s.size;
      });
      db.collection("orders").where("staffId", "==", uid).onSnapshot(s => {
          let t=0, d=0; const today = new Date().toLocaleDateString();
          s.forEach(doc => {
              const data = doc.data();
              t += Number(data.amount || 0);
              if(data.timestamp) {
                  const date = new Date(data.timestamp.seconds * 1000).toLocaleDateString();
                  if(date === today) d += Number(data.amount || 0);
              }
          });
          document.getElementById("myOrders").innerText = s.size;
          document.getElementById("totalEarning").innerText = "₹" + t;
          document.getElementById("todayEarning").innerText = "₹" + d;
      });
  }
</script>
</body>
</html>
