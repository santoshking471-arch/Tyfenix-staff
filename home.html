<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Staff Dashboard | TYFENIX</title>
<style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; min-height: 100vh; }

    /* Premium Header */
    .header {
        position: fixed; top: 0; width: 100%; height: 65px;
        background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
        display: flex; justify-content: space-between; align-items: center;
        padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;
    }
    .logo-text { font-size: 20px; font-weight: 800; letter-spacing: 2px; color: #38bdf8; }
    .menu-btn { width: 30px; cursor: pointer; }
    .menu-btn div { width: 100%; height: 3px; background: #fff; margin: 5px 0; border-radius: 2px; }

    /* Content */
    .content { padding: 90px 20px 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

    .card {
        background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1);
        padding: 20px 10px; border-radius: 20px; text-align: center;
        transition: 0.3s;
    }
    .card h3 { font-size: 10px; color: #94a3b8; text-transform: uppercase; margin: 0; }
    .card p { font-size: 20px; font-weight: 700; color: #fff; margin: 10px 0 0; }

    /* Nav Menu */
    .nav-menu { position: fixed; top: 65px; right: -250px; width: 220px; height: 100%; background: #1e293b; transition: 0.3s; padding: 20px 0; z-index: 999; }
    .nav-menu.active { right: 0; }
    .nav-menu a { display: block; padding: 18px 25px; color: #cbd5e1; text-decoration: none; font-size: 14px; border-bottom: 1px solid #334155; }
</style>
</head>
<body>

<div class="header">
    <div class="logo-text">TYFENIX</div>
    <div class="menu-btn" onclick="document.getElementById('navMenu').classList.toggle('active')">
        <div></div><div></div><div></div>
    </div>
</div>

<div class="nav-menu" id="navMenu">
    <a href="#">My Profile</a>
    <a href="#">Eky Status</a>
    <a href="#">My Activities</a>
    <a href="#">Offers</a>
    <a href="#">My Rewards</a>
    <a href="#" onclick="logout()" style="color:#f87171">Logout</a>
</div>

<div class="content">
    <div class="grid">
        <div class="card"><h3>Products</h3><p id="myProducts">0</p></div>
        <div class="card"><h3>Orders</h3><p id="myOrders">0</p></div>
        <div class="card"><h3>Total</h3><p id="totalEarning">₹0</p></div>
        <div class="card"><h3>Today</h3><p id="todayEarning">₹0</p></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
    authDomain: "reselling-store-c103e.firebaseapp.com",
    projectId: "reselling-store-c103e",
    storageBucket: "reselling-store-c103e.appspot.com",
    messagingSenderId: "411682468136",
    appId: "1:411682468136:web:79cc2b622148f42a62e01d"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  auth.onAuthStateChanged(user => {
      if(!user) { window.location.href = "index.html"; return; }
      loadData(user.uid);
  });

  function loadData(uid) {
      db.collection("products").where("staffId", "==", uid).onSnapshot(s => {
          document.getElementById("myProducts").innerText = s.size;
      });
      db.collection("orders").where("staffId", "==", uid).onSnapshot(s => {
          let t=0, d=0; const today = new Date().toLocaleDateString();
          s.forEach(doc => {
              const data = doc.data();
              t += Number(data.amount || 0);
              if(data.timestamp) {
                  const date = new Date(data.timestamp.seconds * 1000).toLocaleDateString();
                  if(date === today) d += Number(data.amount || 0);
              }
          });
          document.getElementById("myOrders").innerText = s.size;
          document.getElementById("totalEarning").innerText = "₹" + t;
          document.getElementById("todayEarning").innerText = "₹" + d;
      });
  }

  function logout() { auth.signOut().then(() => window.location.href = "index.html"); }
</script>
</body>
</html>
