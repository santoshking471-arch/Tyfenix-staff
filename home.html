<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Dashboard</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        font-family: 'Arial', sans-serif;
        background: #e0f0ff;
    }

    /* Header */
    .header {
        position: fixed;
        top: 0;
        width: 100%;
        background-color: #0b2e6f;
        color: #fff;
        padding: 20px;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        z-index: 100;
    }

    /* Hamburger menu */
    .hamburger {
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding: 5px;
    }

    .hamburger div {
        width: 25px;
        height: 3px;
        background-color: #fff;
        border-radius: 3px;
        transition: 0.3s;
    }

    /* Side menu */
    .side-menu {
        position: fixed;
        top: 0;
        left: -250px;
        width: 250px;
        height: 100%;
        background-color: #0b2e6f;
        color: #fff;
        padding-top: 80px;
        transition: 0.3s;
        display: flex;
        flex-direction: column;
        gap: 20px;
        z-index: 99;
    }

    .side-menu a {
        color: #fff;
        text-decoration: none;
        font-size: 18px;
        padding: 10px 20px;
        border-radius: 10px;
        transition: background 0.3s;
    }

    .side-menu a:hover {
        background-color: #15509b;
    }

    /* Dashboard cards */
    .dashboard-container {
        width: 95%;
        max-width: 1000px;
        margin: 120px auto 20px auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
    }

    .card {
        background: #ffffffdd;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
        transition: transform 0.2s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card h3 {
        margin-bottom: 15px;
        color: #0b2e6f;
    }

    .card p {
        font-size: 22px;
        font-weight: bold;
        color: #15509b;
    }
</style>
</head>
<body>

<div class="header">
    Staff Dashboard
    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
</div>

<div class="side-menu" id="sideMenu">
    <a href="#" onclick="uploadProduct()">Upload Product</a>
    <a href="#" onclick="manageProjects()">Manage Projects</a>
    <a href="#" onclick="manageOrders()">Manage Orders</a>
</div>

<div class="dashboard-container">
    <div class="card">
        <h3>My Products</h3>
        <p id="myProducts">0</p>
    </div>
    <div class="card">
        <h3>My Orders</h3>
        <p id="myOrders">0</p>
    </div>
    <div class="card">
        <h3>Total Earning</h3>
        <p id="totalEarning">₹0</p>
    </div>
    <div class="card">
        <h3>Today's Earning</h3>
        <p id="todayEarning">₹0</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "SENDER_ID",
    appId: "APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // Hamburger menu toggle
  function toggleMenu(){
      const menu = document.getElementById("sideMenu");
      if(menu.style.left === "0px"){
          menu.style.left = "-250px";
      } else {
          menu.style.left = "0px";
      }
  }

  function uploadProduct(){ alert("Upload Product clicked"); }
  function manageProjects(){ alert("Manage Projects clicked"); }
  function manageOrders(){ alert("Manage Orders clicked"); }

  auth.onAuthStateChanged(user => {
    if(!user){
        window.location.href = "index.html";
        return;
    }

    // Check staff and approved
    db.collection("staff").doc(user.uid).get()
      .then(doc => {
        if(doc.exists && doc.data().approved === true){
            const staffId = user.uid;

            // Ensure collections exist by writing empty doc if missing
            db.collection("products").doc("_init").set({init: true}).catch(()=>{});
            db.collection("orders").doc("_init").set({init: true}).catch(()=>{});

            // Realtime fetch My Products
            db.collection("products")
              .where("staffId", "==", staffId)
              .onSnapshot(snapshot => {
                document.getElementById("myProducts").innerText = snapshot.size - 1; // exclude _init
              });

            // Realtime fetch My Orders
            db.collection("orders")
              .where("staffId", "==", staffId)
              .onSnapshot(snapshot => {
                let total = 0;
                let today = 0;
                const todayDate = new Date().toLocaleDateString();

                snapshot.forEach(order => {
                  const data = order.data();
                  if(order.id === "_init") return;
                  total += Number(data.amount || 0);

                  const orderDate = new Date(data.timestamp.seconds * 1000).toLocaleDateString();
                  if(orderDate === todayDate){
                      today += Number(data.amount || 0);
                  }
                });

                document.getElementById("myOrders").innerText = snapshot.size -1;
                document.getElementById("totalEarning").innerText = "₹" + total;
                document.getElementById("todayEarning").innerText = "₹" + today;
              });

        } else {
            alert("Access Denied. You are not approved staff.");
            auth.signOut();
            window.location.href = "index.html";
        }
      });
  });
</script>
</body>
</html>
