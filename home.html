<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TYFENIX Dashboard</title>
<style>
    :root { --bg: #ffffff; --text: #1e293b; --card-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    @media (prefers-color-scheme: dark) {
        :root { --bg: #0f172a; --text: #f8fafc; --card-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }

    /* Header */
    .header { position: sticky; top: 0; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--bg); z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .logo { font-weight: 900; font-size: 22px; color: #38bdf8; }
    .dots { font-size: 24px; cursor: pointer; padding: 5px; }

    /* WhatsApp Style Popup */
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 1500; }
    .overlay.active { display: block; }
    .popup { position: absolute; top: 60px; right: 10px; width: 180px; background: var(--bg); border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: none; z-index: 2000; overflow: hidden; border: 1px solid rgba(128,128,128,0.2); }
    .popup.active { display: block; }
    .popup a { display: block; padding: 15px 20px; text-decoration: none; color: var(--text); font-size: 14px; }
    .popup a:hover { background: rgba(128,128,128,0.1); }

    /* Dashboard */
    .content { padding: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
    .card { background: var(--bg); padding: 20px; border-radius: 20px; text-align: center; box-shadow: var(--card-shadow); border: 1px solid rgba(56, 189, 248, 0.2); }
    .card h3 { font-size: 11px; text-transform: uppercase; margin: 0; color: #94a3b8; }
    .card p { font-size: 22px; font-weight: 800; margin: 10px 0 0; color: #38bdf8; }

    /* Action Buttons */
    .btn-group { display: flex; flex-direction: column; gap: 15px; }
    .btn { background: linear-gradient(135deg, #0b2e6f, #38bdf8); color: #fff; padding: 18px; border-radius: 15px; text-align: center; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(56, 189, 248, 0.3); }
</style>
</head>
<body>

<div class="header">
    <div class="logo">TYFENIX</div>
    <div class="dots" onclick="toggleMenu()">⋮</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="popup" id="popup">
    <a href="#" onclick="menuAction('Profile')">My Profile</a>
    <a href="#" onclick="menuAction('Eky Status')">Eky Status</a>
    <a href="#" onclick="menuAction('Activities')">Activities</a>
    <a href="#" onclick="logout()" style="color:#f87171">Logout</a>
</div>

<div class="content">
    <div class="grid">
        <div class="card"><h3>Products</h3><p id="myProducts">0</p></div>
        <div class="card"><h3>Orders</h3><p id="myOrders">0</p></div>
        <div class="card"><h3>Total</h3><p id="totalEarning">₹0</p></div>
        <div class="card"><h3>Today</h3><p id="todayEarning">₹0</p></div>
    </div>

        <div class="btn-group">
    <button class="btn" onclick="goToUpload()">Upload Product</button>
    <button class="btn" onclick="goToOrders()">Orders</button>
    <button class="btn" onclick="goToPayment()">Payment Status</button>
</div>



<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM", authDomain: "reselling-store-c103e.firebaseapp.com", projectId: "reselling-store-c103e", storageBucket: "reselling-store-c103e.appspot.com", messagingSenderId: "411682468136", appId: "1:411682468136:web:79cc2b622148f42a62e01d" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function toggleMenu() {
        document.getElementById('popup').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function menuAction(opt) { toggleMenu(); alert(opt + " opened!"); }

    auth.onAuthStateChanged(user => {
        if(!user) { window.location.href = "index.html"; return; }
        loadData(user.uid);
    });

    // 1. Upload Product Page par jane ke liye
function goToUpload() {
    window.location.href = "upload.html";
}

// 2. Orders Page par jane ke liye
function goToOrders() {
    window.location.href = "orders.html";
}

// 3. Payment Status Page par jane ke liye
function goToPayment() {
    window.location.href = "payment.html";
}

    function loadData(uid) {
        db.collection("products").where("staffId", "==", uid).onSnapshot(s => { document.getElementById("myProducts").innerText = s.size; });
        db.collection("orders").where("staffId", "==", uid).onSnapshot(s => {
            let t=0, d=0; const today = new Date().toLocaleDateString();
            s.forEach(doc => {
                const data = doc.data();
                t += Number(data.amount || 0);
                if(data.timestamp) {
                    const date = new Date(data.timestamp.seconds * 1000).toLocaleDateString();
                    if(date === today) d += Number(data.amount || 0);
                }
            });
            document.getElementById("myOrders").innerText = s.size;
            document.getElementById("totalEarning").innerText = "₹" + t;
            document.getElementById("todayEarning").innerText = "₹" + d;
        });
    }

    function logout() { auth.signOut().then(() => window.location.href = "index.html"); }
</script>
</body>
</html>
