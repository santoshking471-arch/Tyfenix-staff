<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Staff Login</title>
<style>
    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
    }

    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .login-card {
        width: 85%;
        max-width: 340px;
        background: rgba(255, 255, 255, 0.98);
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        text-align: center;
    }

    .login-card h2 {
        margin: 0 0 15px 0;
        color: #0b2e6f;
        font-size: 20px;
    }

    #errorMsg {
        color: #d93025;
        font-size: 12px;
        font-weight: bold;
        margin-bottom: 10px;
        min-height: 15px;
    }

    .login-card input {
        width: 100%;
        padding: 12px 15px;
        margin: 6px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 15px;
        outline: none;
        user-select: text;
    }

    .login-card input:focus { border-color: #0b2e6f; }

    .login-card button {
        width: 100%;
        padding: 12px;
        margin: 15px 0 10px 0;
        border-radius: 8px;
        border: none;
        background-color: #0b2e6f;
        color: #fff;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
    }

    .register-link {
        color: #0b2e6f;
        text-decoration: none;
        display: block;
        margin-bottom: 20px;
        font-size: 13px;
    }

    .helpline {
        display: flex;
        gap: 8px;
    }

    .helpline a {
        flex: 1;
        padding: 8px;
        border-radius: 6px;
        text-decoration: none;
        color: #fff;
        font-size: 11px;
        font-weight: bold;
    }

    .footer-text {
        font-size: 11px;
        color: #666;
        margin-top: 15px;
    }
</style>
</head>
<body>

<div class="login-card">
    <h2>Staff Login</h2>
    <div id="errorMsg"></div>
    
    <input type="email" id="staffEmail" placeholder="Email ID" spellcheck="false" />
    <input type="password" id="staffPassword" placeholder="Password" />
    
    <button onclick="staffLogin()">Login</button>
    <a href="register.html" class="register-link">New Member? Register</a>

    <div class="helpline">
        <a href="https://wa.me/918817409243" style="background:#25D366">WhatsApp</a>
        <a href="https://www.instagram.com/tyfenix" style="background:#E1306C">Instagram</a>
    </div>

    <div class="footer-text">Helpline: 8817409243</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
    authDomain: "reselling-store-c103e.firebaseapp.com",
    databaseURL: "https://reselling-store-c103e-default-rtdb.firebaseio.com",
    projectId: "reselling-store-c103e",
    storageBucket: "reselling-store-c103e.appspot.com",
    messagingSenderId: "411682468136",
    appId: "1:411682468136:web:79cc2b622148f42a62e01d"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function staffLogin() {
    const email = document.getElementById("staffEmail").value.trim();
    const password = document.getElementById("staffPassword").value;
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.innerText = "Checking...";

    auth.signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
      const uid = userCredential.user.uid;

      // Rule Check: Database se check karo
      db.collection("staff").doc(uid).get()
      .then(doc => {
        if (!doc.exists) {
          // Rule 3: User data not found in staff collection
          errorMsg.innerText = "User not found!";
          auth.signOut();
          return;
        }

        const userData = doc.data();

        // Rule 2: Blocked Check
        if (userData.blocked === true) {
          errorMsg.innerText = "Your account is BLOCKED!";
          auth.signOut();
          return;
        }

        // Rule 1: Admin Approval Check
        if (userData.approved !== true) {
          errorMsg.innerText = "Wait for Admin Approval!";
          auth.signOut();
          return;
        }

        // Sab sahi hai toh login
        window.location.href = "staffDashboard.html";
      })
      .catch(e => {
        errorMsg.innerText = "Database Error!";
        auth.signOut();
      });
    })
    .catch((error) => {
      // Rule 3: Firebase Auth mein hi nahi mila
      errorMsg.innerText = "Invalid Email or Password!";
    });
  }
</script>
</body>
</html>
