<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Staff Login</title>
<style>
    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent; /* Mobile tap highlight remove */
        user-select: none; /* Text selection disable for app feel */
    }

    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden; /* Scroll lock */
    }

    .login-card {
        width: 85%;
        max-width: 350px; /* Slimmer card */
        background: rgba(255, 255, 255, 0.95);
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        text-align: center;
    }

    .login-card h2 {
        margin: 0 0 20px 0;
        color: #0b2e6f;
        font-size: 22px;
        font-weight: 600;
    }

    .login-card input {
        width: 100%;
        padding: 12px 18px;
        margin: 8px 0;
        border-radius: 8px; /* Slightly less round for slim look */
        border: 1px solid #ddd;
        font-size: 15px;
        outline: none;
        transition: border 0.3s;
        user-select: text; /* Input me text allow rahega */
    }

    .login-card input:focus {
        border-color: #0b2e6f;
    }

    .login-card button {
        width: 100%;
        padding: 12px;
        margin: 15px 0 10px 0;
        border-radius: 8px;
        border: none;
        background-color: #0b2e6f;
        color: #fff;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(11, 46, 111, 0.3);
    }

    .register-link {
        color: #0b2e6f;
        text-decoration: none;
        display: block;
        margin-bottom: 20px;
        font-size: 13px;
        font-weight: 500;
    }

    #errorMsg {
        color: #d93025;
        font-size: 12px;
        height: 15px;
        margin-bottom: 5px;
    }

    .helpline {
        display: flex;
        justify-content: space-between;
        gap: 8px;
    }

    .helpline a {
        flex: 1;
        padding: 8px;
        border-radius: 6px;
        text-decoration: none;
        color: #fff;
        background-color: #333; /* Neutral dark for options */
        font-size: 12px;
        font-weight: 500;
    }

    .helpline a:first-child { background-color: #25D366; } /* WhatsApp Green */
    .helpline a:last-child { background-color: #E1306C; } /* Insta Pink */

    .footer-text {
        font-size: 11px;
        color: #666;
        margin-top: 15px;
    }
</style>
</head>
<body>

<div class="login-card">
    <h2>Staff Login</h2>
    <div id="errorMsg"></div>
    <input type="email" id="staffEmail" placeholder="Email ID" spellcheck="false" />
    <input type="password" id="staffPassword" placeholder="Password" />
    
    <button onclick="staffLogin()">Login</button>
    <a href="register.html" class="register-link">Create Account →</a>

    <div class="helpline">
        <a href="https://wa.me/918817409243" target="_blank">WhatsApp</a>
        <a href="https://www.instagram.com/tyfenix?igsh=dHl5bjJoOWJ6c3Vx" target="_blank">Instagram</a>
    </div>

    <div class="footer-text">
        Support: +91 8817409243
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
    authDomain: "reselling-store-c103e.firebaseapp.com",
    databaseURL: "https://reselling-store-c103e-default-rtdb.firebaseio.com",
    projectId: "reselling-store-c103e",
    storageBucket: "reselling-store-c103e.appspot.com",
    messagingSenderId: "411682468136",
    appId: "1:411682468136:web:79cc2b622148f42a62e01d"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function staffLogin() {
    const email = document.getElementById("staffEmail").value.trim();
    const password = document.getElementById("staffPassword").value;
    const errorMsg = document.getElementById("errorMsg");

    if(!email || !password){
        errorMsg.innerText = "Fields cannot be empty";
        return;
    }

    auth.signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
      db.collection("staff").doc(userCredential.user.uid).get()
        .then(doc => {
          if(doc.exists && doc.data().approved === true){
            window.location.href = "staffDashboard.html";
          } else {
            errorMsg.innerText = "Account not approved yet.";
            auth.signOut();
          }
        })
    })
    .catch((error) => {
      errorMsg.innerText = "Invalid credentials.";
    });
  }
</script>
</body>
</html>
