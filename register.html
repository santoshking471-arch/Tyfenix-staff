<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Staff Register</title>
<style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    body, html { 
        margin: 0; padding: 0; height: 100%; width: 100%; 
        font-family: 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        display: flex; justify-content: center; align-items: center; overflow: hidden;
    }
    .register-card {
        width: 85%; max-width: 340px; background: rgba(255, 255, 255, 0.98);
        padding: 20px 25px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center;
    }
    .register-card h2 { margin: 0 0 15px 0; color: #0b2e6f; font-size: 20px; }
    .register-card input {
        width: 100%; padding: 10px 15px; margin: 6px 0; border-radius: 8px;
        border: 1px solid #ccc; font-size: 14px; outline: none; user-select: text;
    }
    .register-card button {
        width: 100%; padding: 12px; margin: 15px 0 10px 0; border-radius: 8px;
        border: none; background-color: #0b2e6f; color: #fff; font-size: 16px; font-weight: bold;
    }
    #errorMsg { color: #d93025; font-size: 12px; margin-bottom: 8px; }
    #successMsg { color: #28a745; font-size: 12px; margin-bottom: 8px; }
    .login-link { color: #0b2e6f; text-decoration: none; font-size: 13px; display: block; margin-top: 10px; }
</style>
</head>
<body>

<div class="register-card">
    <h2>Staff Registration</h2>
    <div id="errorMsg"></div>
    <div id="successMsg"></div>
    
    <input type="text" id="fullName" placeholder="Full Name" spellcheck="false" />
    <input type="number" id="mobileNumber" placeholder="Mobile Number" />
    <input type="email" id="email" placeholder="Email ID" />
    <input type="password" id="password" placeholder="Password" />
    <input type="password" id="confirmPassword" placeholder="Confirm Password" />
    
    <button onclick="registerStaff()">Register Now</button>
    <a href="index.html" class="login-link">Back to Login</a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
    authDomain: "reselling-store-c103e.firebaseapp.com",
    databaseURL: "https://reselling-store-c103e-default-rtdb.firebaseio.com",
    projectId: "reselling-store-c103e",
    storageBucket: "reselling-store-c103e.appspot.com",
    messagingSenderId: "411682468136",
    appId: "1:411682468136:web:79cc2b622148f42a62e01d"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function registerStaff() {
    const fullName = document.getElementById("fullName").value.trim();
    const mobile = document.getElementById("mobileNumber").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");

    if(!fullName || !mobile || !email || !password || !confirmPassword){
        errorMsg.innerText = "All fields are required!";
        return;
    }
    if(password !== confirmPassword){
        errorMsg.innerText = "Passwords don't match!";
        return;
    }

    errorMsg.innerText = "Sending Request...";

    auth.createUserWithEmailAndPassword(email, password)
    .then(userCredential => {
        const uid = userCredential.user.uid;
        
        // Data 'staffRequests' collection mein jayega approval ke liye
        db.collection("staffRequests").doc(uid).set({
            fullName: fullName,
            mobile: mobile,
            email: email,
            uid: uid,
            status: "pending",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            successMsg.innerText = "Request Sent! Wait for Admin Approval.";
            errorMsg.innerText = "";
            auth.signOut();
            setTimeout(() => { window.location.href = "index.html"; }, 3000);
        });
    })
    .catch(error => { errorMsg.innerText = error.message; });
  }
</script>
</body>
</html>
